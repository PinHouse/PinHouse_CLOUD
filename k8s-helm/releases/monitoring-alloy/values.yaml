# ========================================
# Monitoring Alloy 공통 값
# ========================================

global:
  # Alloy 공통 라벨에 사용할 클러스터 식별자입니다.
  clusterName: "pinhouse-cluster"

  # 운영 구분용 환경명입니다.
  environment: "shared"

alloy:
  fullnameOverride: monitoring-alloy

  alloy:
    # DaemonSet 여러 인스턴스 간에 scrape 대상을 나눠 가져가도록 클러스터링을 활성화합니다.
    clustering:
      enabled: true

    enableReporting: false
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
        appProtocol: grpc
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
        appProtocol: http

    configMap:
      content: |-
        // ========================================
        // Traces
        // ========================================
        // 애플리케이션이 보낸 OTLP 트레이스를 gRPC와 HTTP로 모두 수신합니다.
        otelcol.receiver.otlp "traces" {
          grpc {}
          http {}

          output {
            traces = [otelcol.processor.batch.traces.input]
          }
        }

        // 수신한 트레이스를 배치로 묶어 Tempo로 전달합니다.
        otelcol.processor.batch "traces" {
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // 클러스터 내부 Tempo distributor로 트레이스를 전송합니다.
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "monitoring-tempo-distributor.monitoring.svc.cluster.local:4317"

            tls {
              insecure = true
            }
          }
        }

        // ========================================
        // Metrics
        // ========================================
        // Alloy가 수집한 메트릭은 Prometheus remote write receiver로 전달합니다.
        prometheus.remote_write "prometheus" {
          external_labels = {
            cluster     = "{{ .Values.global.clusterName }}",
            environment = "{{ .Values.global.environment }}",
          }

          endpoint {
            url = "http://monitoring-core-kube-prome-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
          }
        }

        // TODO! ServiceMonitor는 추후 추가 예정

        // PodMonitor 리소스를 읽어 Pod 단위 메트릭 대상을 자동으로 수집합니다.
        prometheus.operator.podmonitors "cluster" {
          forward_to = [prometheus.remote_write.prometheus.receiver]

          clustering {
            enabled = true
          }

          scrape {
            default_scrape_interval = "30s"
            default_scrape_timeout  = "10s"
          }
        }

        // Probe 리소스를 읽어 블랙박스 성격의 메트릭 수집 대상을 자동으로 수집합니다.
        prometheus.operator.probes "cluster" {
          forward_to = [prometheus.remote_write.prometheus.receiver]

          clustering {
            enabled = true
          }

          scrape {
            default_scrape_interval = "30s"
            default_scrape_timeout  = "10s"
          }
        }

        // ========================================
        // Logs
        // ========================================
        // 각 Alloy Pod는 자신이 올라간 노드의 Pod 로그만 읽도록 범위를 제한합니다.
        loki.source.podlogs "pods" {
          forward_to = [loki.relabel.pod_logs.receiver]

          node_filter {
            enabled = true
          }
        }

        // CRI 로그 포맷을 파싱한 뒤 Loki로 전달합니다.
        loki.process "pod_logs" {
          forward_to = [loki.write.default.receiver]

          stage.cri {}
        }

        // Kubernetes 메타데이터를 Loki 조회용 라벨로 정리합니다.
        loki.relabel "pod_logs" {
          forward_to = [loki.process.pod_logs.receiver]

          // 네임스페이스는 가장 기본적인 조회 축이라 그대로 보존합니다.
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          // Pod 이름을 그대로 라벨로 남겨 개별 인스턴스 추적에 사용합니다.
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          // 컨테이너 이름은 service fallback과 세부 필터링에 함께 사용합니다.
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          // 장애 분석 시 노드 기준 조회가 가능하도록 노드 이름을 남깁니다.
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }

          // service 추출 규칙: 우선순위가 낮은 것부터 높은 순서로 덮어씁니다.

          // 1. 기본값: 컨테이너 이름
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "service"
          }

          // 2. Pod controller가 ReplicaSet이면 Deployment 이름 추출
          // ReplicaSet 이름 형식: <deployment-name>-<pod-template-hash>
          // pod-template-hash는 마지막 하이픈 뒤의 8-10자리 영숫자
          rule {
            source_labels = ["__meta_kubernetes_pod_controller_kind", "__meta_kubernetes_pod_controller_name"]
            separator     = "/"
            regex         = "ReplicaSet/(.+)-[a-z0-9]{8,10}$"
            replacement   = "$1"
            target_label  = "service"
          }

          // 3. app 라벨이 있으면 우선 사용
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app"]
            regex         = "(.+)"
            target_label  = "service"
          }

          // 4. 표준 app.kubernetes.io/name 라벨이 있으면 최우선
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            regex         = "(.+)"
            target_label  = "service"
          }

          // job은 namespace/service 형식으로 설정합니다.
          rule {
            source_labels = ["__meta_kubernetes_namespace", "service"]
            separator     = "/"
            target_label  = "job"
          }
        }

        // 공통 외부 라벨을 함께 붙여 Loki로 전송합니다.
        loki.write "default" {
          external_labels = {
            cluster     = "{{ .Values.global.clusterName }}",
            environment = "{{ .Values.global.environment }}",
          }

          endpoint {
            url = "http://monitoring-loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          }
        }

  controller:
    type: daemonset

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceMonitor:
    enabled: true
