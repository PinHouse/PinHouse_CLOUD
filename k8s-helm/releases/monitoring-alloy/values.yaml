# ========================================
# Monitoring Alloy 공통 값
# ========================================

global:
  # Alloy 공통 라벨에 사용할 클러스터 식별자입니다.
  clusterName: "pinhouse-cluster"

  # 운영 구분용 환경명입니다.
  environment: "shared"

alloy:
  fullnameOverride: monitoring-alloy
  crds:
    # PodLogs 같은 Alloy CRD를 릴리스와 함께 명시적으로 설치합니다.
    create: true

  alloy:
    # DaemonSet 여러 인스턴스 간에 scrape 대상을 나눠 가져가도록 클러스터링을 활성화합니다.
    clustering:
      enabled: true

    enableReporting: false
    # node_filter가 공식 예시처럼 NODE_NAME 환경변수를 사용할 수 있게 맞춥니다.
    extraEnv:
      - name: NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName

    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
        appProtocol: grpc
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
        appProtocol: http

    configMap:
      content: |-
        // ========================================
        // Traces
        // ========================================
        // 애플리케이션이 보낸 OTLP 트레이스를 gRPC와 HTTP로 모두 수신합니다.
        otelcol.receiver.otlp "traces" {
          grpc {}
          http {}

          output {
            traces = [otelcol.processor.batch.traces.input]
          }
        }

        // 수신한 트레이스를 배치로 묶어 Tempo로 전달합니다.
        otelcol.processor.batch "traces" {
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // 클러스터 내부 Tempo distributor로 트레이스를 전송합니다.
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "monitoring-tempo-distributor.monitoring.svc.cluster.local:4317"

            tls {
              insecure = true
            }
          }
        }

        // ========================================
        // Metrics
        // ========================================
        // Alloy가 수집한 메트릭은 Prometheus remote write receiver로 전달합니다.
        prometheus.remote_write "prometheus" {
          external_labels = {
            cluster     = "{{ .Values.global.clusterName }}",
            environment = "{{ .Values.global.environment }}",
          }

          endpoint {
            url = "http://monitoring-core-kube-prome-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
          }
        }

        // TODO! ServiceMonitor는 추후 추가 예정

        // PodMonitor 리소스를 읽어 Pod 단위 메트릭 대상을 자동으로 수집합니다.
        prometheus.operator.podmonitors "cluster" {
          forward_to = [prometheus.remote_write.prometheus.receiver]

          clustering {
            enabled = true
          }

          scrape {
            default_scrape_interval = "30s"
            default_scrape_timeout  = "10s"
          }
        }

        // Probe 리소스를 읽어 블랙박스 성격의 메트릭 수집 대상을 자동으로 수집합니다.
        prometheus.operator.probes "cluster" {
          forward_to = [prometheus.remote_write.prometheus.receiver]

          clustering {
            enabled = true
          }

          scrape {
            default_scrape_interval = "30s"
            default_scrape_timeout  = "10s"
          }
        }

        // ========================================
        // Logs
        // ========================================
        // 각 Alloy Pod는 자신이 올라간 노드의 Pod 로그만 읽도록 범위를 제한합니다.
        loki.source.podlogs "pods" {
          forward_to = [loki.process.pod_logs.receiver]

          node_filter {
            enabled = true
          }
        }

        // CRI 로그 포맷을 파싱한 뒤 Loki로 전달합니다.
        loki.process "pod_logs" {
          forward_to = [loki.write.default.receiver]

          stage.cri {}
        }

        // 공통 외부 라벨을 함께 붙여 Loki로 전송합니다.
        loki.write "default" {
          external_labels = {
            cluster     = "{{ .Values.global.clusterName }}",
            environment = "{{ .Values.global.environment }}",
          }

          endpoint {
            url = "http://monitoring-loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          }
        }

  controller:
    type: daemonset

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceMonitor:
    enabled: true

# ========================================
# PodLogs 수집 설정
# ========================================

podLogs:
  # Alloy loki.source.podlogs가 읽을 PodLogs CR을 함께 배포합니다.
  enabled: true
