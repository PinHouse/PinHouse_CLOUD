# ========================================
# Prod Monitoring Tempo GitOps 값
# ========================================

tempo:
  # Tempo 공용 ServiceAccount 이름을 고정해 두면 인증 설정을 추적하기 쉽습니다.
  serviceAccount:
    create: true
    name: monitoring-tempo-sa
    annotations: {}

  storage:
    # 트레이스 원본 데이터는 GCS 버킷에 저장합니다.
    trace:
      gcs:
        bucket_name: "pinhouse-prod-tempo"
      # 블록 보관 기간 설정 (14일)
      block:
        retention: 336h  # 14일 = 336시간 (Loki와 동일)

  ingester:
    # 초기 운영 단계는 단일 replica로 시작하되 PVC와 리소스를 명시합니다.
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "gce-standard-rwo"
    # Ingester는 트레이스 쓰기 경로의 핵심이라 상대적으로 큰 메모리를 할당합니다.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
          cpu: 1000m
          memory: 2Gi

  distributor:
    # 애플리케이션에서 들어오는 트레이스를 받아 분산시키는 역할입니다.
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
          cpu: 500m
          memory: 512Mi

  compactor:
    # 저장된 블록을 정리하는 작업이 있으므로 메모리를 조금 더 줍니다.
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
          cpu: 500m
          memory: 1Gi

  querier:
    # Grafana 조회 시 실제 트레이스 검색을 담당합니다.
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
          cpu: 500m
          memory: 1Gi

  queryFrontend:
    # 조회 요청을 정리하고 캐시하기 위한 프론트 레이어입니다.
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
