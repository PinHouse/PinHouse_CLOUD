# ========================================
# Monitoring Core 공통 값
# ========================================

kube-prometheus-stack:
  crds:
    enabled: true

  # kubeadm 기반 self-managed 클러스터에서는 컨트롤 플레인 정적 Pod 메트릭 엔드포인트가
  # 외부에서 바로 접근되지 않는 경우가 많아서 기본값은 비활성화합니다.
  kubeEtcd:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeProxy:
    enabled: false

  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

  grafana:
    enabled: true

    # 운영 전에는 ExternalSecret 기반 existingSecret으로 전환하는 것을 권장합니다.
    adminPassword: "change-me-before-apply"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

    service:
      type: ClusterIP

    persistence:
      enabled: false
      type: sts
      size: 10Gi

    additionalDataSources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://monitoring-loki-gateway.monitoring.svc.cluster.local
        isDefault: false
        jsonData:
          maxLines: 1000
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://monitoring-tempo-query-frontend.monitoring.svc.cluster.local:3100
        isDefault: false

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 40GB
      walCompression: true
      # Prometheus는 Alloy가 전달한 메트릭을 저장/조회하는 역할로 사용합니다.
      enableRemoteWriteReceiver: true

      # 초기 환경 기준 리소스 설정 (운영 환경에서는 values-prod-gitops.yaml에서 override)
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

      # 직접 scrape는 사용하지 않고 Alloy가 ServiceMonitor/PodMonitor/Probe를 scrape합니다.
      # 아래 selector는 의도적으로 아무것도 매칭하지 않도록 둡니다.
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          "pinhouse.co.kr/scrape-via": "prometheus"
      serviceMonitorNamespaceSelector: {}

      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector:
        matchLabels:
          "pinhouse.co.kr/scrape-via": "prometheus"
      podMonitorNamespaceSelector: {}

      probeSelectorNilUsesHelmValues: false
      probeSelector:
        matchLabels:
          "pinhouse.co.kr/scrape-via": "prometheus"
      probeNamespaceSelector: {}

      storageSpec: {}

  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
