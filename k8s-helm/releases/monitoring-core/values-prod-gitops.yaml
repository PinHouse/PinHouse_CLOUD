# ========================================
# Prod Monitoring Core GitOps 값
# ========================================

kube-prometheus-stack:
  grafana:
    # Grafana 관리자 계정은 ExternalSecret이 만든 Kubernetes Secret을 사용합니다.
    admin:
      existingSecret: monitoring-secret-kv
      userKey: GRAFANA_ADMIN_USER
      passwordKey: GRAFANA_ADMIN_PASSWORD

    # Grafana Pod 리소스는 임시로 주석 처리하고 차트 기본값을 사용합니다.
    # resources:
    #   requests:
    #     cpu: 150m
    #     memory: 192Mi
    #   limits:
    #     cpu: 400m
    #     memory: 384Mi

    # 운영 환경에서는 Grafana 대시보드와 설정을 유지하기 위해 PVC를 사용합니다.
    persistence:
      enabled: true
      type: sts
      size: 20Gi
      storageClassName: "gce-standard-rwo"

  prometheus:
    prometheusSpec:
      # 운영 기준 메트릭 보관 기간과 최대 디스크 사용량입니다.
      retention: 15d
      retentionSize: 50GB
      # 실제 scrape는 Alloy가 수행하고, Prometheus는 remote write receiver로 메트릭을 받습니다.
      enableRemoteWriteReceiver: true

      # Prometheus 리소스는 임시로 주석 처리하고 차트 기본값을 사용합니다.
      # resources:
      #   requests:
      #     cpu: 300m
      #     memory: 1Gi
      #   limits:
      #     cpu: 1500m
      #     memory: 2Gi

      # Prometheus가 직접 ServiceMonitor/PodMonitor/Probe를 scrape하지 않도록 둡니다.
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          "pinhouse.co.kr/scrape-via": "prometheus"
      serviceMonitorNamespaceSelector: {}

      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector:
        matchLabels:
          "pinhouse.co.kr/scrape-via": "prometheus"
      podMonitorNamespaceSelector: {}

      probeSelectorNilUsesHelmValues: false
      probeSelector:
        matchLabels:
          "pinhouse.co.kr/scrape-via": "prometheus"
      probeNamespaceSelector: {}

      # 메트릭 장기 보관을 위해 PVC를 사용합니다.
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "gce-standard-rwo"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    # Alertmanager는 알림 라우팅 전용이라 상대적으로 작은 리소스로 시작합니다.
    alertmanagerSpec:
      # 리소스 요청/제한은 임시로 주석 처리하고 차트 기본값을 사용합니다.
      # resources:
      #   requests:
      #     cpu: 50m
      #     memory: 96Mi
      #   limits:
      #     cpu: 150m
      #     memory: 192Mi

  prometheusOperator:
    # Operator는 scrape 주체는 아니지만 Prometheus/Alertmanager 리소스를 생성하므로 계속 필요합니다.
    # 리소스 요청/제한은 임시로 주석 처리하고 차트 기본값을 사용합니다.
    # resources:
    #   requests:
    #     cpu: 50m
    #     memory: 96Mi
    #   limits:
    #     cpu: 150m
    #     memory: 192Mi

  kube-state-metrics:
    # Kubernetes 리소스 상태 수집용 컴포넌트입니다.
    # 리소스 요청/제한은 임시로 주석 처리하고 차트 기본값을 사용합니다.
    # resources:
    #   requests:
    #     cpu: 50m
    #     memory: 192Mi
    #   limits:
    #     cpu: 150m
    #     memory: 384Mi

  prometheus-node-exporter:
    # 노드 메트릭 수집기라서 가볍게 시작하되 과도한 사용을 막기 위해 제한을 둡니다.
    # 리소스 요청/제한은 임시로 주석 처리하고 차트 기본값을 사용합니다.
    # resources:
    #   requests:
    #     cpu: 30m
    #     memory: 48Mi
    #   limits:
    #     cpu: 100m
    #     memory: 96Mi
