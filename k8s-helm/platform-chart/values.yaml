# 민감하지않은 공통 부분 예시만 출력
# 실제 값은 values-nonprod 또는 prod에서 적용해서 처리

# CertManager
certManager:
  enabled: false
  acmeEmail: "example@mail.com"
  letsencrypt:
    staging:
      enabled: false
    production:
      enabled: false
  # DNS-01 Challenge (CloudDNS)
  cloudDNS:
    projectId: "projectId"

# 게이트웨이
gateway:
  enabled: false
  name: pinhouse-gateway
  namespace: nginx-gateway
  gatewayClassName: nginx

  # HTTP 포트 (80)
  http:
    enabled: false
    port: 80

  # HTTP to HTTPS 리다이렉트 (301 Permanent Redirect)
  http_redirect:
    enabled: false  # true로 설정 시 모든 HTTP 요청을 HTTPS로 리다이렉트

  # 환경별 리스너 (for문으로 순회)
  environments:
    - name: dev
      enabled: false
      tlsSecretName: your-tls-dev
      services:
        - name: web
          hostname: dev.your-domain.com       # 🔒 실제 도메인으로 변경
        - name: api
          hostname: dev.api.your-domain.com   # 🔒 실제 도메인으로 변경
        - name: ai
          hostname: dev.ai.your-domain.com    # 🔒 실제 도메인으로 변경

    - name: stg
      enabled: false
      tlsSecretName: your-tls-stg
      services:
        - name: web
          hostname: stg.your-domain.com       # 🔒 실제 도메인으로 변경
        - name: api
          hostname: stg.api.your-domain.com   # 🔒 실제 도메인으로 변경
        - name: ai
          hostname: stg.ai.your-domain.com    # 🔒 실제 도메인으로 변경

    - name: prod
      enabled: false
      tlsSecretName: your-tls-prod
      services:
        - name: web
          hostname: your-domain.com           # 🔒 실제 도메인으로 변경
        - name: api
          hostname: api.your-domain.com       # 🔒 실제 도메인으로 변경
        - name: ai
          hostname: ai.your-domain.com        # 🔒 실제 도메인으로 변경

  # 특수 리스너 (ArgoCD 등)
  listeners:
    argo:
      enabled: false
      domain: nonprod.argo.your-domain.com  # 🔒 실제 도메인으로 변경
      tlsSecretName: your-tls-argo

    grafana:
      enabled: false
      domain: grafana.your-domain.com  # 🔒 실제 도메인으로 변경
      tlsSecretName: your-tls-grafana

# 접근 제어 (Access Control)
accessControl:
  enabled: false
  blockedPaths: []

# 기본 인증 (HTTP Basic Authentication)
basicAuth:
  # 각 항목은 AuthenticationFilter와 HTTPRoute 1쌍을 생성합니다.
  # 라우트를 정의하면 별도 enabled 토글 없이 항상 렌더링합니다.
  routes: []

# 네트워크 정책
networkPolicy:
  enabled: false
  database:
    rds:
      cidr: ""
    ec2:
      ip: ""
  ports:
    frontend: 3000
    backend: 8080
    postgres: 5432
    redis: 6379
    rabbitmq: 5672
    dns: 53
    http: 80
    https: 443
  namespaces: []

# 인증서
certificates:
  enabled: false
  issuer: letsencrypt-prod
  certs: []

# External Secrets Operator 리소스
# ESO 컨트롤러/CRD는 이 차트가 아니라 별도 release로 설치해야 함
externalSecrets:
  enabled: false

  # SecretStore / ClusterSecretStore 리소스 목록
  secretStores: []

  # ExternalSecret 리소스 목록
  secrets: []
