# Prod values

# SSL 매니저
certManager:
  enabled: true

  # 🔒 실제 이메일 주소로 변경
  acmeEmail: "pinhousekr@gmail.com"

  # 테스트 시 true, 검증 완료 후 false
  letsencrypt:
    staging:
      enabled: false
    production:
      enabled: true

  # DNS-01 Challenge (CloudDNS)
  cloudDNS:
    projectId: "prod-pinhouse"

# 게이트웨이
gateway:
  enabled: true
  name: pinhouse-gateway
  namespace: nginx-gateway
  gatewayClassName: nginx

  http:
    enabled: true
    port: 80

  # HTTP to HTTPS 리다이렉트 (301 Permanent Redirect)
  http_redirect:
    enabled: true  # 모든 HTTP 요청을 HTTPS로 리다이렉트

  # 환경별 리스너
  environments:
    - name: prod
      enabled: true
      tlsSecretName: pinhouse-tls-prod
      services:
        - name: web
          hostname: pinhouse.co.kr
        - name: www
          hostname: www.pinhouse.co.kr
        - name: api
          hostname: api.pinhouse.co.kr

  # 추가 리스너
  listeners:
    # Argo CD
    argo:
      enabled: true
      domain: argo.pinhouse.co.kr
      tlsSecretName: pinhouse-tls-argo

    # Grafana 모니터링
    grafana:
      enabled: true
      domain: grafana.pinhouse.co.kr
      tlsSecretName: pinhouse-tls-grafana

# 접근 제어 (Access Control) - 보안 강화 버전
accessControl:
  enabled: true
  blockedPaths:
    # 1. 백엔드 (API) - 스웨거 및 API 문서 차단
    - name: api-prod-swagger
      hostnames: ["api.pinhouse.co.kr"]
      paths:
        - "/swagger-ui"      # UI 페이지 전체 (PathPrefix로 하위 경로 모두 포함)
        - "/v3/api-docs"     # JSON 정의 파일 전체

    # 2. 백엔드 (API) - Actuator 및 메트릭 차단 (규칙 20번 반영)
    - name: api-prod-management
      hostnames: ["api.pinhouse.co.kr"]
      paths:
        - "/actuator"        # Spring Boot 관리 엔드포인트 전체
        - "/metrics"         # 일반 메트릭 경로
        - "/prometheus"      # 프로메테우스 경로

    # 4. 공통/기타 - 프로메테우스 및 민감 경로 (규칙 10번 관련)
    - name: common-prod-metrics
      hostnames: ["pinhouse.co.kr", "www.pinhouse.co.kr"]
      paths:
        - "/api/metrics"     # 규칙 10번에 명시된 경로 (하위 경로 모두 포함)
        - "/prometheus"      # 프로메테우스 경로


# 네트워크 정책
networkPolicy:
  enabled: false

  database:
    rds:
      cidr: "192.16.0.0/16"
    ec2:
      ip: "10.0.0.0/16"

  ports:
    frontend: 3000
    backend: 8080
    postgres: 5432
    redis: 6379
    rabbitmq: 5672
    dns: 53
    http: 80
    https: 443

  namespaces:
    # Nginx-Gateway
    - name: nginx-gateway
      enabled: true

    # 서비스
    - name: app
      enabled: true

# 인증서
certificates:
  enabled: true
  issuer: letsencrypt-prod

  certs:
    - name: pinhouse-tls-prod
      namespace: nginx-gateway
      dnsNames:
        - pinhouse.co.kr
        - www.pinhouse.co.kr
        - api.pinhouse.co.kr
      enabled: true

    # Argo CD
    - name: pinhouse-tls-argo
      namespace: nginx-gateway
      dnsNames:
        - argo.pinhouse.co.kr
      enabled: true

    # Grafana 모니터링
    - name: pinhouse-tls-grafana
      namespace: nginx-gateway
      dnsNames:
        - grafana.pinhouse.co.kr
      enabled: true

# 모니터링 (Grafana HTTPRoute)
monitoring:
  namespace: monitoring
  grafana:
    enabled: true
    domain: grafana.pinhouse.co.kr
    serviceName: pinhouse-monitoring-core-grafana
    servicePort: 80

# GCP Secret Manager 기반 시크릿 적용
externalSecrets:
  enabled: true

  # 시크릿 스토어
  secretStores:
    - kind: ClusterSecretStore
      name: gcp-secret-manager
      spec:
        provider:
          gcpsm:
            projectID: prod-pinhouse

  # 시크릿
  secrets:
    # 백엔드 시크릿 적용
    - name: backend-secret-kv
      namespace: app
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: gcp-secret-manager
          kind: ClusterSecretStore
        target:
          name: backend-secret-kv
          creationPolicy: Owner
          deletionPolicy: Retain
        dataFrom:
          - find:
              name:
                regexp: "^Prod_BE_"
              conversionStrategy: Default
              decodingStrategy: None
            rewrite:
              - regexp:
                  source: "^Prod_BE_(.*)$"
                  target: "$1"

    # 모니터링 Grafana 관리자 시크릿 적용
    - name: monitoring-secret-kv
      namespace: monitoring
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: gcp-secret-manager
          kind: ClusterSecretStore
        target:
          name: monitoring-secret-kv
          creationPolicy: Owner
          deletionPolicy: Retain
        dataFrom:
          - find:
              name:
                regexp: "^Prod_MONITORING_"
              conversionStrategy: Default
              decodingStrategy: None
            rewrite:
              - regexp:
                  source: "^Prod_MONITORING_(.*)$"
                  target: "$1"
