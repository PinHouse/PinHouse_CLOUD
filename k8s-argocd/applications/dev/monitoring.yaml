# ===================================
# Dev Monitoring Root
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

# 기본 정보
metadata:
  name: monitoring-root-dev
  namespace: argocd
  labels:
    pinhouse.co.kr/environment: dev
    pinhouse.co.kr/component: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io

# 스펙
spec:
  project: default

  # Git 저장소에서 관리하는 매니페스트 경로입니다.
  source:
    repoURL: https://github.com/PinHouse/PinHouse_CLOUD
    targetRevision: main
    path: k8s-argocd/applications/dev/monitoring
    directory:
      recurse: false

  # 배포 대상 클러스터와 네임스페이스입니다.
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # Git 기준으로 자동 동기화합니다.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
