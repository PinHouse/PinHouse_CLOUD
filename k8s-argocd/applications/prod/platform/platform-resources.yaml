# ===================================
# Prod Platform Resources
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-resources-prod
  namespace: argocd
  labels:
    pinhouse.co.kr/environment: prod
    pinhouse.co.kr/component: platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/PinHouse/PinHouse_CLOUD
    targetRevision: main
    path: k8s-helm/platform-chart
    helm:
      releaseName: pinhouse-platform
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
