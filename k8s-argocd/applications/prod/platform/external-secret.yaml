# ===================================
# Prod Platform External Secrets Operator
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-external-secret-prod
  namespace: argocd
  labels:
    pinhouse.co.kr/environment: prod
    pinhouse.co.kr/component: platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.20.4
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/k8s-helm/releases/external-secret/values-prod.yaml
    - repoURL: https://github.com/PinHouse/PinHouse_CLOUD
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
