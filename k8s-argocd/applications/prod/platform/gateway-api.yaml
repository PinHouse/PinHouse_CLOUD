# ===================================
# Prod Platform Gateway API CRD
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

# 기본 정보
metadata:
  name: platform-gateway-api-prod
  namespace: argocd
  labels:
    pinhouse.co.kr/environment: prod
    pinhouse.co.kr/component: platform
  annotations:
    # GatewayClass, Gateway, HTTPRoute보다 먼저 CRD를 설치해야 합니다.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

# 스펙
spec:
  project: default

  # Gateway API CRD를 Helm chart로 직접 설치합니다.
  source:
    repoURL: https://gateway-api.github.io/gateway-api
    chart: gateway-api
    targetRevision: v1.2.1
    helm:
      releaseName: gateway-api

  # CRD는 cluster-scoped 리소스라 argocd 네임스페이스로 보냅니다.
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # 동기화 정책
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
