# ===================================
# Prod Platform NGINX Gateway Fabric
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-nginx-gateway-fabric-prod
  namespace: argocd
  labels:
    pinhouse.co.kr/environment: prod
    pinhouse.co.kr/component: platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  sources:
    - repoURL: oci://ghcr.io/nginx/charts
      chart: nginx-gateway-fabric
      targetRevision: 2.4.2
      helm:
        releaseName: ngf
        valueFiles:
          - $values/k8s-helm/releases/nginx-gateway-fabric/values-prod.yaml
    - repoURL: https://github.com/PinHouse/PinHouse_CLOUD
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
