# ===================================
# Prod Platform cert-manager
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

# 기본 정보
metadata:
  name: platform-cert-manager-prod
  namespace: argocd
  labels:
    pinhouse.co.kr/environment: prod
    pinhouse.co.kr/component: platform
  annotations:
    # cert-manager는 platform-chart가 생성하는 Certificate보다 먼저 준비되어야 합니다.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

# 스펙
spec:
  project: default

  # 외부 Helm chart와 Git 저장소 values 파일을 함께 사용합니다.
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.16.2
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/k8s-helm/releases/cert-manager/values-prod.yaml
    - repoURL: https://github.com/PinHouse/PinHouse_CLOUD
      targetRevision: main
      ref: values

  # 배포 대상 클러스터
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  # 동기화 정책
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
