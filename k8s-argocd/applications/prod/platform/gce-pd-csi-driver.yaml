# ===================================
# Prod Platform GCE PD CSI Driver
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

# 기본 정보
metadata:
  name: platform-gce-pd-csi-driver-prod
  namespace: argocd
  labels:
    pinhouse.co.kr/environment: prod
    pinhouse.co.kr/component: platform
  annotations:
    # StorageClass보다 먼저 CSI Driver를 설치해야 합니다.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

# 스펙
spec:
  project: default

  # Kustomize 소스 설정
  source:
    repoURL: https://github.com/kubernetes-sigs/gcp-compute-persistent-disk-csi-driver
    targetRevision: master
    path: deploy/kubernetes/overlays/stable-master

  # CSI Driver는 gce-pd-csi-driver 네임스페이스에 배포됩니다.
  destination:
    server: https://kubernetes.default.svc
    namespace: gce-pd-csi-driver

  # 동기화 정책
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
