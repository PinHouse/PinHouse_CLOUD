# ===================================
# App of Apps 패턴
# Prod 환경의 모든 애플리케이션을 관리
# ===================================

apiVersion: argoproj.io/v1alpha1
kind: Application

# 기본 정보
metadata:
  name: root-prod
  namespace: argocd
  # Finalizers를 설정하면 Application 삭제 시 관련 리소스도 함께 삭제됨
  finalizers:
    - resources-finalizer.argocd.argoproj.io

# 스펙
spec:
  project: default

  # GitOps 소 설정
  source:
    # Git 리포지토리 URL
    repoURL: https://github.com/PinHouse/PinHouse_CLOUD
    # GitOps 기준 브랜치인 main을 참조
    targetRevision: main
    # ArgoCD Application 매니페스트가 있는 디렉토리
    path: k8s-argocd/applications/prod
    # Directory 설정
    directory:
      # 재귀적으로 하위 디렉토리도 포함
      recurse: false

  # 배포 대상 클러스터
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # 동기화 정책
  syncPolicy:
    # GitOps 자동 동기화 설정
    automated:
      # GitOps와 다르면, 삭제
      prune: true
      # GitOps와 다르면, 자동 수정
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
