# ===================================
# ArgoCD Discord 알림 템플릿 및 트리거 설정
# ===================================
#
# 이 파일은 Argo CD 운영 부가 리소스의 base ConfigMap입니다.
# 환경별 Argo CD URL은 overlays/prod 또는 overlays/nonprod 패치에서 덮어씁니다.
# ===================================

apiVersion: v1
kind: ConfigMap

# 기본 정보
metadata:
  name: argocd-notifications-cm
  namespace: argocd

# 데이터
data:
  context.argocdUrl: "https://argo.example.com"

  # ===================================
  # Discord Webhook 서비스 설정
  # ===================================
  # Discord는 webhook 타입으로 설정해야 합니다

  # Frontend Nonprod (Dev + Staging)
  service.webhook.frontend-nonprod: |
    url: $discord-frontend-nonprod-webhook
    headers:
    - name: Content-Type
      value: application/json

  # Backend Nonprod (Dev + Staging)
  service.webhook.backend-nonprod: |
    url: $discord-backend-nonprod-webhook
    headers:
    - name: Content-Type
      value: application/json

  # Frontend Production
  service.webhook.frontend-prod: |
    url: $discord-frontend-prod-webhook
    headers:
    - name: Content-Type
      value: application/json

  # Backend Production
  service.webhook.backend-prod: |
    url: $discord-backend-prod-webhook
    headers:
    - name: Content-Type
      value: application/json

  # ===================================
  # 템플릿: 배포 완료 (Deployed)
  # ===================================
  template.app-deployed: |
    webhook:
      frontend-nonprod:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "✅ 배포 완료",
              "description": "ArgoCD 배포가 성공적으로 완료되었습니다.",
              "color": 3066993,
              "fields": [
                {
                  "name": "🌍 Environment",
                  "value": "{{ index .app.metadata.labels "pinhouse.co.kr/environment" | upper }}",
                  "inline": true
                },
                {
                  "name": "📦 Application",
                  "value": "{{.app.metadata.name}}",
                  "inline": true
                },
                {
                  "name": "📍 Namespace",
                  "value": "{{.app.spec.destination.namespace}}",
                  "inline": true
                },
                {
                  "name": "🔖 Revision",
                  "value": "{{.app.status.sync.revision | substr 0 7}}",
                  "inline": true
                },
                {
                  "name": "🔗 ArgoCD",
                  "value": "[바로가기]({{.context.argocdUrl}}/applications/{{.app.metadata.name}})",
                  "inline": false
                }
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }
      backend-nonprod:
        method: POST
        body: |
          {
            "embeds": [{
